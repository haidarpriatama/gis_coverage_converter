name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_API_BASE_URL: https://api.example.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run lint
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt
      - run: sudo apt-get update && sudo apt-get install -y gdal-bin libgdal-dev libspatialindex-dev
      - run: python -m pip install --upgrade pip && pip install -r requirements-dev.txt
      - run: pip-audit -r requirements.txt --progress-spinner off
      - run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q
